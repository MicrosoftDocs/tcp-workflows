name: (Deprecated) GUID assign

# DEPRECATED — no-op.
#
# This post-merge awa-articleGuid assignment approach was abandoned: a workflow can't write to a
# contributor's fork, and the protected-branch / "changes via PR" rules block the follow-up-PR
# workaround in practice. GUID presence and uniqueness are now enforced in-PR by Shared-GuidCheck.
#
# This file is intentionally a valid no-op that still accepts (and ignores) the inputs/secrets
# existing callers pass, so those callers don't fail with "Invalid workflow file". Remove the
# GuidAssign caller workflow from the calling repos when convenient, then delete this file.

on:
  workflow_call:
    # Declared as optional and ignored — present only so existing callers that still pass them
    # (or that have removed them) both remain valid.
    inputs:
      PayloadJson:
        required: false
        type: string
    secrets:
      AccessToken:
        required: false

# Requests no permissions, so this is callable from any repo regardless of how its org policy
# caps the caller's GITHUB_TOKEN.
permissions: {}

jobs:
  noop:
    # Never runs. Kept as a valid, skipped job so the workflow file parses and callers succeed.
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Shared-GuidAssign is deprecated and does nothing. See Shared-GuidCheck."
